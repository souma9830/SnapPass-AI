name: "🐛 Bug Report"
description: "Report a bug to help improve SnapPass AI"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below with as much detail as possible.
  - type: textarea
    id: problem
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "Describe the issue..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
      placeholder: "What should have happened..."
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: "Environment Information"
      description: "Where did you run into this bug?"
      options:
        - "Local Dev (npm start / npm run dev)"
        - "Docker Compose Setup"
        - "Production (Vercel / Render / Railway)"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or log output about the problem here."
      placeholder: "Screenshots, stack traces, console logs..."
    validations:
      required: false
