name: "🚀 Feature Request"
description: "Suggest a new idea or enhancement for SnapPass AI"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make SnapPass AI better? Describe it here!
  - type: textarea
    id: idea
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is (e.g. 'I'm always frustrated when...')."
      placeholder: "A clear description of the problem..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
      placeholder: "How should this feature work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
      placeholder: "Any alternative approaches or workarounds..."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context, mockup designs, or screenshots about the feature request here."
      placeholder: "Any drawings, UI mocks, or relevant links..."
    validations:
      required: false
