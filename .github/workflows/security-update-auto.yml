name: Auto Security Update

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - path: frontend
            name: Frontend
          - path: backend
            name: Backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.project.path }}/package-lock.json'

      - name: Install dependencies
        run: |
          cd ${{ matrix.project.path }}
          npm ci

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          cd ${{ matrix.project.path }}
          npm audit --audit-level=high --json > audit-report.json 2>&1 || true

      - name: Parse audit results
        id: parse
        run: |
          REPORT="${{ matrix.project.path }}/audit-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "No audit report generated."
            exit 0
          fi

          VULN_COUNT=$(node -e "
            const r = require('./$REPORT');
            const count = r.vulnerabilities ? Object.keys(r.vulnerabilities).length : 0;
            console.log(count);
          ")

          echo "vulnerabilities=$VULN_COUNT" >> $GITHUB_OUTPUT

          if [ "$VULN_COUNT" -gt "0" ]; then
            echo "Found $VULN_COUNT vulnerabilities in ${{ matrix.project.name }}"
            node -e "
              const r = require('./$REPORT');
              if (r.vulnerabilities) {
                Object.entries(r.vulnerabilities).forEach(([pkg, info]) => {
                  if (info.severity === 'critical' || info.severity === 'high') {
                    console.log('SEVERITY=' + info.severity + ' PACKAGE=' + pkg + ' VIA=' + info.via.map(v => typeof v === 'string' ? v : v.source).join(',') + ' FIX_AVAILABLE=' + (info.fixAvailable ? 'true' : 'false'));
                  }
                });
              }
            " > vulns.txt
          fi

      - name: Create issue for critical vulnerabilities
        if: steps.parse.outputs.vulnerabilities != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vulnPath = '${{ matrix.project.path }}/vulns.txt';

            if (!fs.existsSync(vulnPath)) {
              console.log('No vulnerability report to process.');
              return;
            }

            const vulns = fs.readFileSync(vulnPath, 'utf8').trim().split('\n').filter(Boolean);

            if (vulns.length === 0) {
              console.log('No high/critical vulnerabilities found.');
              return;
            }

            let body = '## Automated Security Audit Report\n\n';
            body += `**Project:** ${{ matrix.project.name }}\n`;
            body += `**Total vulnerabilities found:** ${{ steps.parse.outputs.vulnerabilities }}\n\n`;
            body += '### High/Critical Vulnerabilities\n\n';
            body += '| Severity | Package | Advisory | Fix Available |\n';
            body += '|----------|---------|----------|---------------|\n';

            vulns.forEach(v => {
              const parts = v.split(' ');
              const sev = parts[0].split('=')[1];
              const pkg = parts[1].split('=')[1];
              const via = parts[2] ? parts[2].split('=')[1] : 'unknown';
              const fix = parts[3] ? parts[3].split('=')[1] : 'unknown';
              body += `| ${sev} | ${pkg} | ${via} | ${fix} |\n`;
            });

            body += '\n\n---\n*Generated by automated security audit workflow.*';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Automated audit found vulnerabilities in ${{ matrix.project.name }}`,
              labels: ['type:security', 'dependencies', 'status:triage'],
              body: body,
            });
