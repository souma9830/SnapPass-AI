name: Python AI Service CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'python-ai-service/**'
      - '.github/workflows/python-ai.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'python-ai-service/**'
      - '.github/workflows/python-ai.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'python-ai-service/requirements.txt'

      - name: Install System Libraries (for OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: python-ai-service

      - name: Validate App Imports and Startup
        run: python -c "from main import app"
        working-directory: python-ai-service
