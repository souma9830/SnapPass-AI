name: "📚 Documentation Improvement"
description: "Suggest improvements, fixes, or additions to the documentation"
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us make our docs clean, clear, and comprehensive!
  - type: textarea
    id: details
    attributes:
      label: "What needs to be updated?"
      description: "Explain what part of the documentation is missing, inaccurate, or could be improved."
      placeholder: "E.g., installation guide needs updating for Windows users..."
    validations:
      required: true
  - type: textarea
    id: proposed-changes
    attributes:
      label: "Proposed Changes"
      description: "What exactly should the updated documentation say?"
      placeholder: "Draft of the new text or structural outline..."
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any other context or links to existing documentation files."
      placeholder: "E.g. link to README.md or CONTRIBUTING.md"
    validations:
      required: false
