name: Docker CI Build and Verify

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-verify:
    name: Build & Verify Services
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: |
        docker build -t snappass-backend:latest ./backend

    - name: Build AI Service Docker Image
      run: |
        docker build -t snappass-ai-service:latest ./python-ai-service

    - name: Build Frontend Docker Image
      run: |
        docker build -t snappass-frontend:latest ./frontend
