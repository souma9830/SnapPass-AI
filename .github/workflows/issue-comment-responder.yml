name: Issue Comment Responder

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-respond to new issues
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;

            // Skip if the issue already has a label (probably manually triaged)
            if (issue.labels.length > 0) return;

            const greeting = `Hey @${issue.user.login}! 👋

            Thank you for opening an issue in **SnapPass AI**. Our team will review it soon.

            In the meantime:
            - Check if your issue has already been addressed in our [documentation](https://github.com/souma9830/SnapPass-AI/tree/master/docs).
            - Browse existing issues to avoid duplicates.
            - If this is a **bug report**, please ensure you've included steps to reproduce.
            - If this is a **feature request**, tell us more about the use case!

            We appreciate your contribution to making SnapPass AI better! 🚀`;

            github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: greeting
            });
