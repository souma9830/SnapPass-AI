name: PR Welcomer and Labeler

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add welcoming comment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 Hello! Thank you for raising this PR. The maintainers will review it shortly. Please ensure your branch passes CI tests!'
            })
