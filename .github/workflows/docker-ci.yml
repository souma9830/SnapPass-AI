name: Docker Build Validation CI

on:
  pull_request:
    branches: [ master ]

jobs:
  validate-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: snappass-frontend:test

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: snappass-backend:test

      - name: Build Python AI Service Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./python-ai-service
          file: ./python-ai-service/Dockerfile
          push: false
          tags: snappass-python-ai:test
