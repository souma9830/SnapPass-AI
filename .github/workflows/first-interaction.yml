name: Welcome First-Time Contributors

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Greet first-time contributor
        uses: actions/github-script@v7
        with:
          script: |
            const isFirstIssue = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.sender.login,
              state: 'all'
            }).then(response => response.data.length === 1);

            const isFirstPR = context.payload.pull_request
              ? await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  author: context.payload.sender.login,
                  state: 'all'
                }).then(response => response.data.length === 1)
              : false;

            if (!isFirstIssue && !isFirstPR) return;

            const type = context.payload.issue ? 'issue' : 'pull request';
            const noun = isFirstIssue ? 'issue' : 'pull request';
            const body = `🎉 Welcome to SnapPass AI, @${context.payload.sender.login}!

            Thank you for opening your first ${noun} in this project! We truly appreciate your contribution.

            Here are some helpful resources to get started:
            - 📖 Read our [Contributing Guide](https://github.com/souma9830/SnapPass-AI/blob/master/CONTRIBUTING.md)
            - 📚 Browse the [Documentation](https://github.com/souma9830/SnapPass-AI/tree/master/docs)
            - 💬 Join the discussion in existing issues
            - ⭐ Star the repository if you find it useful!

            A maintainer will review your ${type} soon. If you have any questions, feel free to ask! 🚀`;

            const method = context.payload.issue
              ? github.rest.issues.createComment
              : github.rest.pulls.createReview;

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              [context.payload.issue ? 'issue_number' : 'pull_number']: context.payload.issue
                ? context.payload.issue.number
                : context.payload.pull_request.number,
              body
            };

            await method(params);
