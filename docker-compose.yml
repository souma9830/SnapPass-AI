version: "3.9"

volumes:
  mongo-data:
    driver: local
  backend-uploads:
    driver: local

services:
  mongo:
    image: mongo:7.0
    container_name: snappass-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: snappass
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: snappass_secret
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: snappass-backend
    restart: unless-stopped
    ports:
      - "5000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      AI_SERVICE_URL: http://python-ai-service:8000
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 10485760
      CORS_ORIGIN: http://localhost:5173
      MONGO_URI: mongodb://admin:snappass_secret@mongo:27017/snappass?authSource=admin
      JWT_SECRET: dev-jwt-secret-change-in-production
      REDIS_URL: ""
    depends_on:
      mongo:
        condition: service_healthy
      python-ai-service:
        condition: service_started
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: snappass-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend

  python-ai-service:
    build: ./python-ai-service
    container_name: snappass-python-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if r.status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
